# Разработка с hot reload: исходники с хоста, Next.js в режиме dev.
#
#   pnpm docker:dev   # то же, что compose с --profile cron (сервис sync-cron из базового docker-compose.yml)
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile cron up --build
#
# node_modules и .next — в именованных томах, чтобы не затирались bind-mount'ом
# и не требовали pnpm на хосте. Первый старт: entrypoint выполнит pnpm install.
#
# На macOS/Windows с Docker Desktop при «залипании» HMR можно усилить polling
# (уже включён WATCHPACK_POLLING / CHOKIDAR_USEPOLLING).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - beer_tracker_node_modules:/app/node_modules
      - beer_tracker_next:/app/.next

  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: ["pnpm", "exec", "tsx", "scripts/sync-worker.ts"]
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      TRACKER_API_URL: ${TRACKER_API_URL:-https://api.tracker.yandex.net/v3}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?Set AUTH_SESSION_SECRET in .env (≥32 characters)}
      ORG_SECRETS_ENCRYPTION_KEY: ${ORG_SECRETS_ENCRYPTION_KEY:?Set ORG_SECRETS_ENCRYPTION_KEY in .env}
      BEER_TRACKER_SCHEMA: ${BEER_TRACKER_SCHEMA:-beer_tracker}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-beer_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - beer_tracker_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  beer_tracker_node_modules:
  beer_tracker_next:
